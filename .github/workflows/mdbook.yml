name: Site

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install mdBook
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install the publisher (host-lifecycle, at its .host-software pin)
        # The pin recorded in .host-software is the canonical source for this rev, so the
        # publisher is always the same release the repo gates on; the hardcoded rev this
        # replaces (v0.38.0-era) drifted several releases behind. The feature history that
        # comment carried lives in the plan rows and the host-lifecycle release tags.
        run: |
          REV=$(awk '/\[software "host-lifecycle"\]/{f=1} f && /pin/{print $3; exit}' .host-software)
          echo "host-lifecycle pin: $REV"
          cargo install --git https://github.com/connollydavid/host-lifecycle --rev "$REV" --root "$HOME/.local"
      - name: Generate the book (lifecycle order; every room)
        # Writes book.toml at the root (src = "mdBook/src", build-dir = "mdBook/out", never ".")
        # + mdBook/src/; --check fails the build unless every room with source renders a page.
        # Reads the committed .host-software for the Where stub, so no worktree need be materialized.
        run: |
          host-lifecycle book .
          host-lifecycle book --check .
      - name: Build site
        run: mdbook build
      - name: Assert the built layout
        run: test -f mdBook/out/index.html
      - name: Resolve the book mount
        id: mount
        # A non-default book-mount publishes under a sub-path and keeps the surrounding
        # site; the root default replaces the whole site. The tool owns the normalisation.
        run: |
          MOUNT="$(host-lifecycle book --print-mount .)"
          if [ "$MOUNT" = "/" ]; then
            echo "dir=" >> "$GITHUB_OUTPUT"
            echo "keep=false" >> "$GITHUB_OUTPUT"
          else
            echo "dir=${MOUNT#/}" >> "$GITHUB_OUTPUT"
            echo "keep=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./mdBook/out
          destination_dir: ${{ steps.mount.outputs.dir }}
          keep_files: ${{ steps.mount.outputs.keep }}
