name: Site

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install the publisher (host-lifecycle, pinned)
        # Pinned to v0.31.0: software --check HAZARDs a declared deeper rung whose shared re-deriver
        # (host-prove) does not run (plan/0048); v0.30.3: --docs/prose audits the authored working tree,
        # including untracked non-ignored files (plan/0047, host-lint#17); v0.30.2: book writes its source to mdBook/src
        # and the built HTML to mdBook/out (book.toml at root, build from root), freeing docs/ for
        # authored content (plan/0046, host-lifecycle#3); v0.30.1: the in-process prose recheck embeds the
        # host-lint engine that honors the per-repo LEXICON in the prose lane (host-lifecycle#2); v0.30.0
        # book recurses nested specs and moves retired
        # (Status: superseded) decisions into an Archive/Record section, and
        # links README-landing rooms to their served index with a colon nav
        # separator (host#15); v0.26.0 added the receipted task graph and its
        # per-task gate to software --check (plan/0042); v0.26.1 makes next fail
        # closed on a numberless directory (plan/0041); v0.27.0 adds the
        # entrance check (plan/0040); v0.29.0 generalizes it to a declared
        # `[entrance]` stanza (plan/0043); v0.30.0 retires the legacy per-member
        # marker (plan/0043).
        run: cargo install --git https://github.com/connollydavid/host-lifecycle --rev 3958b6248eaf3e7ad6b017fc597cd7e30f17a59b --root "$HOME/.local"
      - name: Generate the book (lifecycle order; every room)
        # Writes book.toml at the root (src = "mdBook/src", build-dir = "mdBook/out", never ".")
        # + mdBook/src/; --check fails the build unless every room with source renders a page.
        # Reads the committed .host-software for the Where stub, so no worktree need be materialized.
        run: |
          host-lifecycle book .
          host-lifecycle book --check .
      - name: Build site
        run: mdbook build
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./mdBook/out
