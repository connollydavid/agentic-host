name: Site

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install the publisher (host-lifecycle, pinned)
        # Pinned to the v0.6.2 commit (call/0014; reads the stamp `name` for the
        # book title); the .host stamp records the template revision adopted.
        run: cargo install --git https://github.com/connollydavid/host-lifecycle --rev 86a9b722443d1d6b78ef03a1116ed38bf54c14ab --root "$HOME/.local"
      - name: Generate the book (lifecycle order; every room)
        # Writes book.toml (src = "docs", never ".") + docs/; --check fails the build
        # unless every room with source renders a page. Reads the committed
        # .host-software for the Where stub, so no worktree need be materialized.
        run: |
          host-lifecycle book .
          host-lifecycle book --check .
      - name: Build site
        run: mdbook build
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./book
