# Prove host-lint's build is reproducible: rebuild from the recorded pin and check the
# artifact reproduces its recorded sha256 (the production anchor; plan/0005, plan/0006).
# Bit-for-bit reproducibility needs a fixed toolchain AND a fixed OS/linker, so the build
# runs inside the digest-pinned `toolchain` container recorded in .host-software — and
# host-lifecycle >= 0.16.0 `--verify-build` now drives that container itself (host#14), so
# this job runs on the bare runner (where docker is available) rather than inside a
# container. host-lint is greenfield, so it must reproduce; there is no repro-exempt for it.
name: Reproducible build

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # weekly drift check

jobs:
  verify-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true # host-template carries the lifecycle.manifest the receipt gate reads
      - name: Install host-lifecycle at its .host-software pin (the reproducibility anchor)
        # The pin recorded in .host-software is the canonical source for this rev; a
        # hardcoded rev here drifted one release behind and failed the check with a
        # binary older than the one the repo gates on. Derived, it re-pins itself on
        # every release cascade.
        run: |
          REV=$(awk '/\[software "host-lifecycle"\]/{f=1} f && /pin/{print $3; exit}' .host-software)
          echo "host-lifecycle pin: $REV"
          cargo install --git https://github.com/connollydavid/host-lifecycle --rev "$REV"
      - name: Install host-prove at its .host-software pin (the shared re-deriver the runnability gate probes — plan/0048)
        # software --check (>= v0.31.0) HAZARDs a declared deeper rung whose re-deriver does not
        # run; agentic-host declares kani:/apalache:/tlaps:, so the gate needs host-prove on PATH.
        run: |
          REV=$(awk '/\[software "host-prove"\]/{f=1} f && /pin/{print $3; exit}' .host-software)
          echo "host-prove pin: $REV"
          cargo install --git https://github.com/connollydavid/host-prove --rev "$REV"
      - name: Materialize the software (bare store + worktrees)
        run: host-lifecycle software --materialize .
      - name: Check the software (pins, spec lanes, obligations, no HAZARD)
        run: host-lifecycle software --check .
      - name: Check the entrance (phases + wired tools covered, .host stamp canonical — plan/0040)
        # The binding entrance check runs here, where the spine sources (the manifest,
        # .host-software) and the materialized host worktree are present; the entrance
        # repo itself cannot run it (it carries neither). agentic-host-local, no adopter
        # obligation and no spine change.
        run: host-lifecycle entrance --check .
      - name: Verify reproducibility (rebuild inside the recorded toolchain container)
        run: host-lifecycle software --verify-build .

  cold-clone:
    # Exercise the fresh-clone seed path end to end: a checkout carries no
    # host-lifecycle and no worktrees, so seed the materializer by its recorded pin,
    # materialize every component, wire the skill links, and assert each generated link
    # resolves and none is tracked (worktree-absence coherence, call/0005).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true # allium + specula + host-template arrive by submodule
      - name: Seed host-lifecycle by its recorded pin (the materializer cannot materialize itself)
        run: |
          REV=$(awk '/\[software "host-lifecycle"\]/{f=1} f && /pin/{print $3; exit}' .host-software)
          echo "host-lifecycle pin: $REV"
          cargo install --git https://github.com/connollydavid/host-lifecycle --rev "$REV"
      - name: Materialize every .host-software component
        run: host-lifecycle software --materialize .
      - name: Wire the skill links from submodules and worktrees
        run: ./link-skills.sh
      - name: Every generated skill link resolves
        run: |
          bad=0
          for l in .claude/skills/*; do
            [ -e "$l" ] || { echo "DANGLING: $l -> $(readlink "$l")"; bad=1; }
          done
          [ "$bad" = 0 ] || { echo "dangling skill link(s) present"; exit 1; }
      - name: The eleven software-component skill links are present
        run: |
          n=$(ls -l .claude/skills/ | grep -c '../../software/')
          echo "software-component skill links: $n"
          [ "$n" = 11 ] || { echo "expected 11 software-component links, got $n"; exit 1; }
      - name: No skill link is tracked
        run: |
          tracked=$(git ls-files .claude/skills)
          [ -z "$tracked" ] || { echo "tracked skill link(s): $tracked"; exit 1; }
